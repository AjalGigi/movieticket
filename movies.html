<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Movies — CinéBook</title>
    <meta name="description"
        content="Browse all movies now showing and coming soon. Filter by genre, language and rating.">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
</head>

<body data-page="movies">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🎬</div>
                <div class="logo-text">Ciné<span>Book</span></div>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="movies.html" class="active">Movies</a>
                <a href="my-bookings.html">My Bookings</a>
            </div>
            <div class="nav-actions">
                <a href="my-bookings.html" class="nav-bookings-btn">🎫 My Tickets</a>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <div class="breadcrumb">
                <a href="index.html">Home</a>
                <span class="sep">›</span>
                <span class="current">Movies</span>
            </div>
            <h1 style="font-size:2rem;font-weight:800;margin-bottom:0.5rem">All Movies</h1>
            <p style="color:var(--text-secondary)" id="resultsCount">Loading…</p>
        </div>
    </div>

    <div class="section-sm">
        <div class="container">

            <!-- Search + Filters -->
            <div class="search-filters">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" class="search-filter-input" placeholder="Search movies, genres…"
                        autocomplete="off">
                </div>
                <select id="genreFilter" class="form-select" style="width:auto;padding:10px 14px;">
                    <option value="all">All Genres</option>
                    <option value="Action">Action</option>
                    <option value="Drama">Drama</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Horror">Horror</option>
                    <option value="Romance">Romance</option>
                    <option value="Mystery">Mystery</option>
                </select>
                <select id="langFilter" class="form-select" style="width:auto;padding:10px 14px;">
                    <option value="all">All Languages</option>
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                </select>
                <select id="sortFilter" class="form-select" style="width:auto;padding:10px 14px;">
                    <option value="rating">Sort: Top Rated</option>
                    <option value="title">Sort: A–Z</option>
                    <option value="duration">Sort: Duration</option>
                </select>
            </div>

            <!-- Genre Quick Chips -->
            <div class="filter-chips">
                <button class="filter-chip active" data-genre="all">All</button>
                <button class="filter-chip" data-genre="Action">⚔️ Action</button>
                <button class="filter-chip" data-genre="Sci-Fi">🚀 Sci-Fi</button>
                <button class="filter-chip" data-genre="Drama">🎭 Drama</button>
                <button class="filter-chip" data-genre="Thriller">🔪 Thriller</button>
                <button class="filter-chip" data-genre="Horror">👻 Horror</button>
                <button class="filter-chip" data-genre="Romance">❤️ Romance</button>
                <button class="filter-chip" data-genre="Mystery">🔍 Mystery</button>
                <button class="filter-chip" data-genre="Family">👨‍👩‍👧 Family</button>
            </div>

            <!-- Movies Grid -->
            <div id="moviesGrid" class="movies-grid stagger"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="nav-logo">
                    <div class="logo-icon">🎬</div>
                    <div class="logo-text">Ciné<span>Book</span></div>
                </div>
                <div class="footer-links">
                    <a href="index.html">Home</a>
                    <a href="my-bookings.html">My Bookings</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/booking.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
